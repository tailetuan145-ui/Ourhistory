<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50th Anniversary - People's Police University</title>
    <style>
        /* TÙY CHỈNH NỀN TẢNG */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: transparent; 
            font-family: 'Times New Roman', Times, serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* KHUNG CHỨA ẢNH - Thiết lập relative để canh tọa độ cho nút */
        .banner-container {
            position: relative; /* Quan trọng: Giữ nút dịch nằm gọn bên trong khung này */
            max-width: 1000px; /* Độ rộng tối đa của ảnh */
            width: 100%;
            margin: 30px auto;
            border-radius: 12px;
            overflow: hidden; /* Cắt các góc nhọn của ảnh cho bo tròn mượt mà */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Hiệu ứng đổ bóng */
        }

        /* NÚT DỊCH NẰM TRÊN ẢNH */
        .overlay-translate-btn {
            position: absolute;
            top: 20px;  /* Cách lề trên của ảnh 20px */
            left: 20px; /* Cách lề trái của ảnh 20px */
            z-index: 10; /* Đảm bảo nút luôn nằm trên cùng */
            
            /* Hiệu ứng nền kính mờ sang trọng */
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            
            color: #800000; /* Màu đỏ đô tiệp với màu của ảnh */
            border: 1px solid rgba(128, 0, 0, 0.3);
            padding: 6px 16px;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif; 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px; /* Nút bo tròn dạng viên thuốc */
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .overlay-translate-btn:hover {
            background-color: #ffffff;
            transform: scale(1.05); /* Phóng to nhẹ khi di chuột */
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .overlay-translate-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Định dạng ảnh */
        .banner-img {
            width: 100%;
            height: auto;
            display: block; /* Tránh khoảng trống thừa dưới đáy ảnh */
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        /* Responsive: Thu nhỏ nút một chút trên điện thoại */
        @media (max-width: 600px) {
            .overlay-translate-btn {
                top: 10px;
                left: 10px;
                padding: 4px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        
        <button class="overlay-translate-btn" id="translateBannerBtn">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c1.39-2.39 3.58-4.04 6.16-4.64-.69 1.14-1.26 2.36-1.68 3.64H6.62zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
            <span>Translate / Dịch</span>
        </button>

        <!-- Ảnh Tiếng Anh (Mặc định) -->
        <img id="banner-img-en" src="our history.png" alt="50 Years of a Glorious Journey" class="banner-img">
        
        <!-- Ảnh Tiếng Việt (Bị ẩn lúc ban đầu) -->
        <img id="banner-img-vi" src="4.Inf.png" alt="50 Năm Hành Trình Vinh Quang" class="banner-img" style="display: none;">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const translateBtn = document.getElementById('translateBannerBtn');
            const imgEn = document.getElementById('banner-img-en');
            const imgVi = document.getElementById('banner-img-vi');
            
            let isVietnamese = false;

            translateBtn.addEventListener('click', function() {
                isVietnamese = !isVietnamese;
                
                if (isVietnamese) {
                    // Hiển thị ảnh Tiếng Việt
                    imgEn.style.display = 'none';
                    imgVi.style.display = 'block';
                } else {
                    // Hiển thị ảnh Tiếng Anh
                    imgVi.style.display = 'none';
                    imgEn.style.display = 'block';
                }
            });
        });
    </script>

</body>
</html>
